name: 'BoringCache One'
description: 'Primary mise-powered GitHub Action for the BoringCache suite across archive, proxy, and build adapters.'
author: 'BoringCache'
inputs:
  cli-version:
    description: 'Version of BoringCache CLI to install (e.g., v1.0.1). Set to "skip" to disable automatic CLI setup.'
    default: 'v1.12.4'
    required: false
  setup:
    description: 'Runtime setup owner: mise, external, or none.'
    default: 'mise'
    required: false
  mode:
    description: 'Product mode: auto, archive, docker, buildkit, bazel, gradle, rust-sccache, or turbo-proxy.'
    default: 'auto'
    required: false
  preset:
    description: 'Workflow preset: none, rails, or node-turbo.'
    default: 'none'
    required: false
  workspace:
    description: 'Workspace identifier in format namespace/workspace (e.g., my-org/my-project). If not provided, uses repository name.'
    required: false
  cache-tag:
    description: 'Optional cache tag or prefix. Defaults vary by mode.'
    required: false
  working-directory:
    description: 'Project root used for tool detection and relative cache paths.'
    default: '.'
    required: false
  tools:
    description: 'Explicit mise tools to install, one per line (e.g. ruby@3.3, node@22).'
    required: false
  cache-runtime:
    description: 'Cache the mise runtime directory when setup is mise.'
    default: 'true'
    required: false
  read-only:
    description: 'Proxy-backed modes: run without writes when supported.'
    default: 'false'
    required: false
  proxy-port:
    description: 'Proxy-backed modes: explicit proxy port.'
    required: false
  proxy-no-git:
    description: 'Proxy-backed modes: disable git scoping.'
    default: 'false'
    required: false
  proxy-no-platform:
    description: 'Proxy-backed modes: disable platform scoping.'
    default: 'false'
    required: false
  context:
    description: 'Docker or BuildKit build context path.'
    default: '.'
    required: false
  dockerfile:
    description: 'Dockerfile path relative to the working directory or build context.'
    default: 'Dockerfile'
    required: false
  image:
    description: 'Docker or BuildKit image name (for example ghcr.io/org/app).'
    required: false
  tags:
    description: 'Image tags, comma-separated or newline-separated.'
    default: 'latest'
    required: false
  build-args:
    description: 'Build arguments as newline-separated KEY=VALUE pairs.'
    required: false
  target:
    description: 'Target build stage.'
    required: false
  platforms:
    description: 'Target platforms for multi-arch builds.'
    required: false
  push:
    description: 'Push image output to the registry.'
    default: 'false'
    required: false
  load:
    description: 'Load Docker image output into the local daemon when supported.'
    default: 'true'
    required: false
  no-cache:
    description: 'Disable cache usage for Docker or BuildKit builds.'
    default: 'false'
    required: false
  secrets:
    description: 'Docker or BuildKit secrets, newline-separated.'
    required: false
  driver:
    description: 'Buildx driver for Docker mode.'
    default: 'docker-container'
    required: false
  driver-opts:
    description: 'Additional buildx driver options, newline-separated.'
    required: false
  buildkitd-config-inline:
    description: 'Inline BuildKit daemon TOML config for Docker mode.'
    required: false
  cache-backend:
    description: 'Backend for Docker or BuildKit cache: registry or local.'
    default: 'registry'
    required: false
  cache-mode:
    description: 'Build cache mode for Docker or BuildKit: min or max.'
    default: 'max'
    required: false
  registry-tag:
    description: 'Optional human-readable registry tag alias for proxy-backed Docker or BuildKit cache.'
    required: false
  buildkit-host:
    description: 'BuildKit address for buildctl mode, for example tcp://host:1234 or unix:///run/buildkit/buildkitd.sock.'
    required: false
  buildkit-tls-ca:
    description: 'TLS CA certificate path or PEM contents for BuildKit.'
    required: false
  buildkit-tls-cert:
    description: 'TLS client certificate path or PEM contents for BuildKit.'
    required: false
  buildkit-tls-key:
    description: 'TLS client key path or PEM contents for BuildKit.'
    required: false
  buildkit-tls-skip-verify:
    description: 'Skip TLS verification for BuildKit.'
    default: 'false'
    required: false
  output:
    description: 'Custom buildctl output. When set, image, tags, and push are ignored in BuildKit mode.'
    required: false
  ssh:
    description: 'BuildKit SSH specs, newline-separated.'
    required: false
  bazel-version:
    description: 'Bazel version for Bazelisk. Sets USE_BAZEL_VERSION when provided or auto-detected via mise.'
    required: false
  gradle-home:
    description: 'Gradle user home directory.'
    default: '~/.gradle'
    required: false
  enable-build-cache:
    description: 'Set org.gradle.caching=true in gradle.properties.'
    default: 'true'
    required: false
  rust-version:
    description: 'Rust version or channel to install when not handled by mise.'
    required: false
  toolchain:
    description: 'Alias for rust-version.'
    required: false
  targets:
    description: 'Rust target triples to install, comma-separated.'
    required: false
  components:
    description: 'Rust components to install, comma-separated.'
    required: false
  profile:
    description: 'Rustup profile: minimal, default, or complete.'
    default: 'minimal'
    required: false
  cache-cargo:
    description: 'Cache cargo registry and git directories.'
    default: 'true'
    required: false
  cache-cargo-bin:
    description: 'Cache cargo bin directory.'
    default: 'false'
    required: false
  cache-target:
    description: 'Cache the Rust target directory.'
    default: 'true'
    required: false
  sccache:
    description: 'Enable sccache for Rust builds.'
    default: 'false'
    required: false
  sccache-cache-size:
    description: 'Maximum local sccache cache size.'
    default: '5G'
    required: false
  sccache-mode:
    description: 'sccache storage mode: local or proxy.'
    default: 'local'
    required: false
  turbo-api-url:
    description: 'Explicit Turbo remote cache endpoint. When omitted, boringcache/one starts a local proxy.'
    required: false
  turbo-token:
    description: 'Turbo remote cache token.'
    required: false
  turbo-team:
    description: 'Turbo remote cache team slug.'
    required: false
  turbo-port:
    description: 'Preferred port for a local Turbo proxy.'
    default: '4227'
    required: false
  entries:
    description: 'Cache entries in tag:path format (comma-separated for multiple). Unified format for both save and restore.'
    required: false
  path:
    description: 'A list of files, directories, and wildcard patterns to cache and restore (actions/cache compatible)'
    required: false
  key:
    description: 'An explicit key for restoring and saving the cache (actions/cache compatible)'
    required: false
  restore-keys:
    description: 'An ordered list of prefix-matched keys for restoring stale cache if no cache hit occurred'
    required: false
  # GitHub Actions specific features (handled at action level)
  enableCrossOsArchive:
    description: 'Enable cross-platform cache sharing by disabling automatic platform suffixes (translates to CLI --no-platform flag)'
    default: 'false'
    required: false
  save-always:
    description: 'Run the post step to save the cache even if another step fails (GitHub Actions feature)'
    default: 'false'
    required: false
  # CLI flags (passed directly to boringcache CLI)
  no-platform:
    description: 'Disable automatic platform suffix for tags (CLI --no-platform flag)'
    default: 'false'
    required: false
  fail-on-cache-miss:
    description: 'Fail the workflow if cache entry is not found (CLI --fail-on-cache-miss flag)'
    default: 'false'
    required: false
  lookup-only:
    description: 'Check if a cache entry exists without downloading (CLI --lookup-only flag)'
    default: 'false'
    required: false
  force:
    description: 'Force save even if cache entry already exists on server (CLI --force flag)'
    default: 'false'
    required: false
  verbose:
    description: 'Enable detailed output (CLI --verbose flag)'
    default: 'false'
    required: false
  exclude:
    description: 'Glob patterns to exclude from cache (comma-separated, e.g., "*.out,*.log"). Excludes files that produce non-deterministic content.'
    required: false
outputs:
  cache-hit:
    description: 'A boolean value indicating an archive or mode-specific cache hit was found'
  runtime-cache-hit:
    description: 'A boolean value indicating the mise runtime cache was restored'
  resolved-mode:
    description: 'The effective cache mode used by the action'
  resolved-tools:
    description: 'Resolved mise tools as a newline-separated list'
  workspace:
    description: 'Resolved BoringCache workspace'
  cache-tag:
    description: 'Resolved cache tag or prefix'
  proxy-port:
    description: 'Resolved proxy port for proxy-backed modes'
  proxy-log-path:
    description: 'Proxy log file path for Bazel mode'
  image-id:
    description: 'Built Docker image ID when available'
  digest:
    description: 'Built image digest when available'
  buildx-name:
    description: 'Docker buildx builder name'
  buildx-platforms:
    description: 'Available platforms for the Docker buildx builder'
  rust-version:
    description: 'Resolved Rust version'
  cargo-tag:
    description: 'Resolved cargo registry cache tag'
  target-tag:
    description: 'Resolved Rust target cache tag'
  cargo-bin-tag:
    description: 'Resolved cargo bin cache tag'
  sccache-tag:
    description: 'Resolved sccache cache tag'
  sccache-hit:
    description: 'Whether the sccache cache was restored'
runs:
  using: 'node24'
  main: 'dist/restore/index.js'
  post: 'dist/save/index.js'
  post-if: "success() || inputs.save-always == 'true'"
branding:
  icon: 'archive'
  color: 'blue'
